[mypy]
python_version = 3.13
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = True

# SQLModel specific fixes
[mypy-sqlmodel.*]
ignore_missing_imports = True
disallow_untyped_defs = False

[mypy-sqlalchemy.*]
ignore_missing_imports = True
disallow_untyped_defs = False

# Ignore import errors for these modules
[mypy-pydantic.*]
ignore_missing_imports = True
