services:
  # 1. AI Service (Python FastAPI)
  - type: web
    name: scopewise-ai
    env: python
    rootDir: ai
    buildCommand: "pip install -U uv && uv pip install --system -e ."
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.0
      - key: OPENAI_API_KEY
        sync: false # Set this manually in the Render dashboard

  # 2. Laravel Backend
  - type: web
    name: scopewise-backend
    env: docker
    rootDir: backend
    envVars:
      - key: APP_KEY
        generateValue: true
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_URL
        fromService:
          type: web
          name: scopewise-backend
          envVarKey: RENDER_EXTERNAL_URL
      - key: PYTHON_SERVICE_URL
        fromService:
          type: web
          name: scopewise-ai
          envVarKey: RENDER_INTERNAL_URL
      - key: DB_CONNECTION
        value: sqlite
    disk:
      name: database
      mountPath: /var/www/html/database
      sizeGB: 1

  # 3. Vue 3 Frontend
  - type: web
    name: scopewise-frontend
    env: static
    rootDir: frontend
    buildCommand: "npm install && npm run build"
    staticPublishPath: dist
    envVars:
      - key: VITE_LARAVEL_API_URL
        sync: false # Set this manually to the backend URL + "/api" (e.g., https://scopewise-backend-xxxx.onrender.com/api)
