version: '3.8'

services:
  # 1. Vue Frontend + Nginx
  frontend:
    build:
      context: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    environment:
      - VITE_LARAVEL_API_URL=/api

  # 2. Laravel Backend
  backend:
    build:
      context: ./backend
    expose:
      - "8080"
    depends_on:
      - db
    restart: unless-stopped
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_URL=http://localhost
      - PYTHON_SERVICE_URL=http://ai:8080
      - DB_CONNECTION=pgsql
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=scopewise
      - DB_USERNAME=scopewise
      # DB_PASSWORD is automatically loaded from the .env file
    env_file:
      - .env

  # 3. PostgreSQL Database (Used by both Laravel and AI)
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_DB=scopewise
      - POSTGRES_USER=scopewise
      # POSTGRES_PASSWORD is automatically loaded from the .env file
    env_file:
      - .env
    volumes:
      - pg_data:/var/lib/postgresql/data

  # 4. Python AI Service
  ai:
    build:
      context: ./ai
    expose:
      - "8080"
    depends_on:
      - db
    restart: unless-stopped
    environment:
      - PYTHON_VERSION=3.13.0
      - DATABASE_URL=postgresql+psycopg://scopewise:${DB_PASSWORD}@db:5432/scopewise
    env_file:
      - .env

networks:
  default:
    name: scopewise-network

volumes:
  pg_data:
